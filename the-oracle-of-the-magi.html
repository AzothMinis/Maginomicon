<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Oracle of the Magi</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6030;
    --deep: #080c18;
    --panel: #0e1428;
    --border: rgba(201,168,76,0.25);
    --text: #d4c5a0;
    --text-dim: #7a6e58;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(80,30,10,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(20,40,80,0.22) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 80%, rgba(50,15,70,0.15) 0%, transparent 50%);
    z-index: -2; pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(5,3,10,0.6) 100%);
    z-index: -1; pointer-events: none;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 100px;
  }

  header { text-align: center; padding: 20px 0 32px; }
  .title-ornament {
    font-size: 10px; letter-spacing: 7px;
    color: var(--gold); text-transform: uppercase;
    font-family: 'Cinzel', serif; margin-bottom: 14px;
  }
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 5vw, 2.9rem);
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.12);
    letter-spacing: 3px; line-height: 1.15; margin-bottom: 12px;
  }
  .subtitle { font-size: 1rem; color: var(--text-dim); font-style: italic; letter-spacing: 1px; }
  .divider {
    display: flex; align-items: center; gap: 14px; margin: 16px 0 26px;
  }
  .divider::before { content:''; flex:1; height:1px; background: linear-gradient(to right, transparent, var(--gold-dim)); }
  .divider::after  { content:''; flex:1; height:1px; background: linear-gradient(to left,  transparent, var(--gold-dim)); }
  .divider span { color: var(--gold); font-size: 16px; }

  /* ── Oracle panel ── */
  .oracle-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    position: relative;
  }
  .oracle-panel::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  /* ── Question tab bar ── */
  .question-bar {
    display: flex;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  .q-btn {
    flex: 1;
    background: transparent;
    border: none; border-right: 1px solid rgba(201,168,76,0.12);
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 4px;
    text-transform: uppercase;
    padding: 17px 4px; cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }
  .q-btn:last-child { border-right: none; }
  .q-btn:hover { color: var(--gold-light); background: rgba(201,168,76,0.04); }
  .q-btn.active {
    color: var(--gold-light);
    background: rgba(201,168,76,0.07);
  }
  .q-btn.active::after {
    content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
    background: var(--gold);
  }


  /* ── Panel body ── */
  .panel-body {
    padding: 30px 28px 26px;
    display: flex; flex-direction: column; gap: 26px;
  }

  /* Active question heading */
  .active-question { text-align: center; }
  .active-q-word {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.5rem, 4vw, 2.1rem);
    color: var(--gold-light); letter-spacing: 4px;
  }
  .active-q-sub {
    font-style: italic; font-size: 0.9rem;
    color: var(--text-dim); margin-top: 5px;
  }
  .active-q-hint {
    font-family: 'Cinzel', serif; font-size: 8px;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold-dim); margin-top: 10px; min-height: 14px;
  }

  /* Triangle layout */
  .cards-triangle {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .triangle-top {
    display: flex; justify-content: center;
  }
  .triangle-bottom {
    display: flex; justify-content: center; gap: 28px;
  }
  .card-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .slot-label {
    font-family: 'Cinzel', serif; font-size: 7px;
    letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;
    text-align: center;
  }
  /* connector lines between top and bottom cards */
  .triangle-connectors {
    position: relative; width: 180px; height: 10px; margin: 0 auto;
  }
  .triangle-connectors::before,
  .triangle-connectors::after {
    content: '';
    position: absolute; top: 0;
    height: 100%; width: 1px;
    background: linear-gradient(to bottom, rgba(201,168,76,0.3), transparent);
  }
  .triangle-connectors::before { left: 50%; transform: translateX(-50%) rotate(-20deg); transform-origin: top center; }
  .triangle-connectors::after  { left: 50%; transform: translateX(-50%) rotate(20deg);  transform-origin: top center; }

  .tarot-card {
    width: 74px; height: 112px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; padding: 8px 5px;
    position: relative; overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
  }
  .tarot-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .tarot-card.clickable { cursor: pointer; }
  .tarot-card.clickable:hover {
    border-color: rgba(201,168,76,0.65);
    box-shadow: 0 0 22px rgba(201,168,76,0.14);
    transform: translateY(-4px);
  }
  .tarot-card.dim { opacity: 0.14; pointer-events: none; }
  .tarot-card.revealed {
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 0 16px rgba(201,168,76,0.10);
  }
  .card-back { display:flex; align-items:center; justify-content:center; width:100%; height:100%; }
  .tarot-card.revealed .card-back { display:none; }
  .card-front { display:none; flex-direction:column; align-items:center; justify-content:center; gap:3px; width:100%; }
  .tarot-card.revealed .card-front { display:flex; }
  .card-num { font-family:'Cinzel',serif; font-size:7.5px; color:var(--gold-dim); letter-spacing:1px; }
  .card-sym { font-size:24px; line-height:1; filter:drop-shadow(0 0 6px rgba(201,168,76,0.4)); }
  .card-name { font-family:'Cinzel',serif; font-size:7px; font-weight:600; text-align:center; color:var(--gold-light); line-height:1.3; letter-spacing:0.5px; margin-top:2px; }

  /* Answer */
  .answer-box {
    min-height: 58px;
    border-left: 2px solid rgba(201,168,76,0.35);
    background: rgba(201,168,76,0.03);
    padding: 13px 16px;
    opacity: 0; transition: opacity 0.4s;
    text-align: center;
  }
  .answer-box.visible { opacity: 1; }
  .answer-seed {
    font-style: italic; font-size: 1.1rem;
    color: var(--text); line-height: 1.7;
    display: flex; flex-direction: column; gap: 4px;
    align-items: center;
  }
  .card-tags { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; justify-content: center; }
  .card-tag {
    font-family:'Cinzel',serif; font-size:7.5px;
    letter-spacing:1.5px; text-transform:uppercase;
    color:var(--gold-dim); padding:2px 7px;
    border:1px solid rgba(201,168,76,0.18);
  }

  /* Buttons */
  .action-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .action-btn {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    padding: 10px 22px; cursor: pointer;
    position: relative; overflow: hidden; transition: all 0.3s;
  }
  .action-btn::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, transparent 30%, rgba(201,168,76,0.08) 50%, transparent 70%);
    transform: translateX(-100%); transition: transform 0.5s;
  }
  .action-btn:hover::before { transform: translateX(100%); }
  .action-btn:hover { border-color:var(--gold); color:var(--gold-light); background:rgba(201,168,76,0.06); box-shadow:0 0 28px rgba(201,168,76,0.14); }

  /* History */
  .history-section { margin-top: 52px; }
  .history-title { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
  .history-title::before, .history-title::after { content:''; flex:1; height:1px; background:var(--gold-dim); opacity:0.35; }
  .history-title span { font-family:'Cinzel',serif; font-size:9px; letter-spacing:5px; text-transform:uppercase; color:var(--gold); white-space:nowrap; }
  .history-empty { text-align:center; font-style:italic; color:var(--text-dim); font-size:0.9rem; padding:24px; }
  .history-entries { display:flex; flex-direction:column; gap:14px; }
  .history-entry { border:1px solid rgba(201,168,76,0.12); padding:16px 20px; position:relative; }
  .history-entry::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(to right, transparent, rgba(201,168,76,0.3), transparent); }
  .history-current-label {
    font-family:'Cinzel',serif; font-size:8px; letter-spacing:3px;
    text-transform:uppercase; color:var(--gold); margin-bottom:10px;
  }
  .history-date { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:var(--gold-dim); margin-bottom:10px; }
  .history-rows { display:flex; flex-direction:column; gap:7px; }
  .history-row { display:grid; grid-template-columns:55px 1fr; gap:10px; align-items:baseline; }
  .history-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); }
  .history-answer { font-style:italic; font-size:0.9rem; color:var(--text-dim); line-height:1.5; }

  @media (max-width:500px) {
    .q-btn { font-size:8px; letter-spacing:2px; padding:14px 2px; }
    .tarot-card { width:60px; height:92px; }
    .card-sym { font-size:18px; }
    .panel-body { padding:20px 16px 18px; }
  }
</style>
</head>

    </div>
  </div>

</div>

  where:{"0":"On the edge of the known — the border between safety and wilderness.","I":"In a place of craft and focus — a workshop, a study, a forge.","II":"In a threshold space — a library, a chapel, the hour before dawn.","III":"In a place of abundance — a garden, a market, a hearth.","IV":"At the seat of power — a hall of governance, a fortress, a court.","V":"In an institution — a school, a temple, a guild with rules and ranks.","VI":"At a crossroads — literal or otherwise, two paths diverging.","VII":"On the move — a road, a vessel, a city that never slows.","VIII":"In the wild — somewhere raw and untamed, beyond walls.","IX":"In solitude — a high place, an island, the furthest room.","X":"Somewhere unpredictable — a market, a fair, a changing city.","XI":"In a place of judgment — a court, a council, a public square.","XII":"Suspended between — a bridge, a cliff edge, a moment held in time.","XIII":"At the end of a road — a ruin, a graveyard, a place of transformation.","XIV":"By water — a river, a shore, a ford where currents meet.","XV":"Underground — a cellar, a vault, a place where things are hidden.","XVI":"High and precarious — a tower, a cliff, a structure near collapse.","XVII":"At a well, a spring, or an open sky — wherever clarity lives.","XVIII":"In the deep night — a forest path, a fog-bound shore, a dreaming city.","XIX":"In the open — a plaza, a field, somewhere nothing is concealed.","XX":"In a place of memory — ruins, graves, the house where it all began.","XXI":"At the centre — the place all roads lead, the heart of the matter.","A♠":"In a place of conflict — a battlefield, a debate hall, a contested room.","2♠":"Somewhere still — a room where two people face each other in silence.","3♠":"In a private place — wherever grief is allowed.","4♠":"In a sanctuary — a retreat, a sickroom, a place of enforced quiet.","5♠":"On abandoned ground — the aftermath of something violent.","6♠":"On the water — a boat, a bridge, a crossing.","7♠":"Somewhere fam const BACK=`<svg viewBox="0 0 44 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="52"><rect x="1" y="1" width="42" height="62" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L43 63M43 1L1 63" stroke="#c9a84c" stroke-width=".5"/><circle cx="22" cy="32" r="11" stroke="#c9a84c" stroke-width=".6"/><circle cx="22" cy="32" r="4" fill="#c9a84c" fill-opacity=".15"/></svg>`;

let pool=[], qs={}, activeKey=QUESTIONS[0].key, history=[];

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pick(){if(!pool.length)pool=shuffle(DECK);return{...pool.pop()};}

function blend(key,cards){
  const T=SEEDS[key];
  return cards.map((c,i)=>{
    let s=T[c.num]||'';
    if(key==='when' && i>0){ s=s.replace(/^[^—,]+[—,]\s*/,''); s=s.charAt(0).toUpperCase()+s.slice(1); }
    return s;
  }).filter(Boolean).join('\n');
}
function blendFlat(key,cards){
  const T=SEEDS[key];
  return cards.map((c,i)=>{
    let s=T[c.num]||'';
    if(key==='when' && i>0){ s=s.replace(/^[^—,]+[—,]\s*/,''); s=s.charAt(0).toUpperCase()+s.slice(1); }
    return s;
  }).filter(Boolean).join(' ');
}

function init(){
  QUESTIONS.forEach(q=>{qs[q.key]={drawn:[],revealed:0,done:false};});
  activeKey=QUESTIONS[0].key;
  buildBar();
  render();
}

function buildBar(){
  document.getElementById('question-bar').innerHTML=
    QUESTIONS.map(q=>`<button class="q-btn" id="qbtn-${q.key}" onclick="selectQ('${q.key}')">${q.label}</button>`).join('');
}

function selectQ(key){activeKey=key;render();}

function render(){
  // Tab states
  QUESTIONS.forEach(q=>{
    const b=document.getElementById('qbtn-'+q.key);
    b.className='q-btn'+(qs[q.key].done?' done':'')+(q.key===activeKey?' active':'');
  });

  const q=QUESTIONS.find(q=>q.key===activeKey);
  const s=qs[activeKey];
  document.getElementById('active-word').textContent=q.label;

  // Build triangle: card 0 on top (answer), cards 1 & 2 on bottom (clarifiers)
  // Always draw exactly 3 cards; bottom two are dim until top is revealed
  const tri=document.getElementById('cards-triangle');
  tri.innerHTML='';

  function makeCard(idx, label) {
    const wrap=document.createElement('div');
    wrap.className='card-wrap';

    const card=document.createElement('div');
    card.className='tarot-card';

    if(s.drawn.length===0) {
      // Nothing drawn yet — top card is clickable (triggers draw), bottom two dim
      if(idx===0){
        card.classList.add('clickable');
        card.innerHTML=`<div class="card-back">${BACK}</div><div class="card-front"></div>`;
        card.onclick=()=>firstClick();
      } else {
        card.classList.add('dim');
        card.innerHTML=`<div class="card-back">${BACK}</div><div class="card-front"></div>`;
      }
    } else if(idx < s.revealed){
      // Already revealed
      const c=s.drawn[idx];
      card.classList.add('revealed');
      card.innerHTML=`<div class="card-back">${BACK}</div><div class="card-front"><div class="card-num">${c.num}</div><div class="card-sym">${c.sym}</div><div class="card-name">${c.name}</div></div>`;
    } else if(idx===s.revealed && idx < s.drawn.length){
      // Next to reveal — clickable only if the previous card is already revealed
      // Top card (0) always goes first; bottom cards unlock after top revealed
      const canReveal = idx===0 || s.revealed>=1;
      if(canReveal){
        card.classList.add('clickable');
        card.innerHTML=`<div class="card-back">${BACK}</div><div class="card-front"></div>`;
        const ii=idx;
        card.onclick=()=>revealCard(ii);
      } else {
        card.classList.add('dim');
        card.innerHTML=`<div class="card-back">${BACK}</div><div class="card-front"></div>`;
      }
    } else {
      // Drawn but not yet unlocked (bottom cards before top is flipped)
      card.classList.add('dim');
      card.innerHTML=`<div class="card-back">${BACK}</div><div class="card-front"></div>`;
    }

    const lbl=document.createElement('div');
    lbl.className='slot-label';
    lbl.textContent=label;
    wrap.appendChild(card);
    wrap.appendChild(lbl);
    return wrap;
  }

  // Top row
  const topRow=document.createElement('div');
  topRow.className='triangle-top';
  topRow.appendChild(makeCard(0,'Answer'));
  tri.appendChild(topRow);

  // Connector
  const conn=document.createElement('div');
  conn.className='triangle-connectors';
  tri.appendChild(conn);

  // Bottom row
  const botRow=document.createElement('div');
  botRow.className='triangle-bottom';
  botRow.appendChild(makeCard(1,'Clarifier'));
  botRow.appendChild(makeCard(2,'Clarifier'));
  tri.appendChild(botRow);

  // Answer text
  const revCards=s.drawn.slice(0,s.revealed);
  const box=document.getElementById('answer-box');
  if(revCards.length){
    box.classList.add('visible');
    const sentences=blend(activeKey,revCards).split('\n');
    document.getElementById('answer-seed').innerHTML=sentences.map(l=>`<span>${l}</span>`).join('');
    document.getElementById('card-tags').innerHTML=revCards.map(c=>`<span class="card-tag">${c.name}</span>`).join('');
  } else {
    box.classList.remove('visible');
  }
}

function firstClick(){
  // Draw 3 cards then reveal the top card immediately
  const s=qs[activeKey];
  if(s.drawn.length)return;
  s.drawn.push(pick(),pick(),pick());
  revealCard(0);
}

function revealCard(idx){
  const s=qs[activeKey];
  if(idx!==s.revealed)return;
  s.revealed++;
  if(s.revealed>=s.drawn.length)s.done=true;
  render();
  updateHistory();
}

function resetReading(){
  const any=QUESTIONS.some(q=>qs[q.key].revealed>0);
  if(any){
    // Finalise the current live entry
    if(history.length>0&&history[0]._current) delete history[0]._current;
    else saveHistory();
  }
  pool=[];
  const preservedKey=activeKey;
  QUESTIONS.forEach(q=>{qs[q.key]={drawn:[],revealed:0,done:false};});
  activeKey=preservedKey;
  buildBar();
  render();
}

function saveHistory(){
  const answers=QUESTIONS.map(q=>{
    const s=qs[q.key];
    const rc=s.drawn.slice(0,s.revealed);
    return{label:q.label,seed:rc.length?blendFlat(q.key,rc):null};
  }).filter(a=>a.seed);
  if(!answers.length)return;
  history.unshift({answers});
  renderHistory();
}

function updateHistory(){
  // Re-render the live reading into history slot 0 (current reading)
  const answers=QUESTIONS.map(q=>{
    const s=qs[q.key];
    const rc=s.drawn.slice(0,s.revealed);
    return{label:q.label,seed:rc.length?blendFlat(q.key,rc):null};
  }).filter(a=>a.seed);
  if(!answers.length){renderHistory();return;}
  // Replace or set slot 0 as the current reading
  if(history.length===0||history[0]._current){
    history[0]={answers,_current:true};
  } else {
    history.unshift({answers,_current:true});
  }
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById('history-container');
  if(!history.length){el.innerHTML='<p class="history-empty">No previous readings yet.</p>';return;}
  el.innerHTML='<div class="history-entries">'+
    history.map((e,i)=>`<div class="history-entry"><div class="history-rows">${
        e.answers.map(a=>`<div class="history-row"><div class="history-label">${a.label}</div><div class="history-answer">${a.seed}</div></div>`).join('')
      }</div></div>`).join('')+
  '</div>';
}

function clearHistory(){
  history=[];
  renderHistory();
}

init();
</script>

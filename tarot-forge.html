<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot Story Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6030;
    --deep: #080608;
    --panel: #0e0b10;
    --border: rgba(201,168,76,0.25);
    --text: #d4c5a0;
    --text-dim: #7a6e58;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 70%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 40%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 90%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%, rgba(201,168,76,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(4,2,6,0.85) 100%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  header { text-align: center; padding: 20px 0 36px; }
  .title-ornament {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    font-family: 'Cinzel', serif;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.15);
    letter-spacing: 4px;
    line-height: 1.1;
    margin-bottom: 14px;
  }
  .subtitle {
    font-size: 1.05rem;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 1px;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 18px 0 28px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim));
  }
  .divider::after { background: linear-gradient(to left, transparent, var(--gold-dim)); }
  .divider span { color: var(--gold); font-size: 18px; }

  /* Instruction */
  .instr {
    text-align: center;
    font-style: italic;
    font-size: 1rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    min-height: 24px;
    margin-bottom: 24px;
  }

  /* Pyramid */
  .pyramid { display: flex; flex-direction: column; gap: 12px; }
  .prow { display: flex; justify-content: center; gap: 12px; align-items: flex-start; }
  .row-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-dim);
    text-align: center;
    margin-bottom: 8px;
  }

  /* Cards */
  .card-slot { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .slot-label {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
  }

  .tarot-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 6px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
  }
  .tarot-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .tarot-card.lg, .tarot-card.md, .tarot-card.sc { width: 76px; height: 116px; }

  .tarot-card.clickable {
    cursor: pointer;
  }
  .tarot-card.clickable:hover {
    border-color: rgba(201,168,76,0.6);
    box-shadow: 0 0 20px rgba(201,168,76,0.12);
    transform: translateY(-4px);
  }
  .tarot-card.dim {
    opacity: 0.2;
    pointer-events: none;
  }
  .tarot-card.revealed {
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 0 18px rgba(201,168,76,0.1);
    cursor: default;
  }

  /* Card back */
  .card-back {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }
  .card-back svg { opacity: 0.15; }
  .tarot-card .card-back svg { width: 42px; height: 58px; }

  /* Card front */
  .card-front {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    width: 100%;
    padding: 2px;
  }
  .tarot-card.revealed .card-front { display: flex; }
  .tarot-card.revealed .card-back { display: none; }

  .card-num {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    color: var(--gold-dim);
    letter-spacing: 1px;
  }
  .card-sym {
    font-size: 24px;
    line-height: 1;
    filter: drop-shadow(0 0 6px rgba(201,168,76,0.4));
  }
  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 7px;
    font-weight: 600;
    text-align: center;
    color: var(--gold-light);
    line-height: 1.3;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* Controls below pyramid */
  .pyramid-controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 28px;
  }
  .action-btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 10px 24px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }
  .action-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(201,168,76,0.08) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .action-btn:hover::before { transform: translateX(100%); }
  .action-btn:hover {
    background: rgba(201,168,76,0.06);
    box-shadow: 0 0 30px rgba(201,168,76,0.15), inset 0 0 30px rgba(201,168,76,0.05);
  }
  .action-btn.dim-btn {
    border-color: var(--gold-dim);
    color: var(--text-dim);
  }
  .action-btn.dim-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* Story panel */
  .story-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 36px 40px;
    margin-top: 40px;
    position: relative;
    display: none;
  }
  .story-panel.visible { display: block; }
  .story-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }
  .story-panel::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  }
  .story-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 24px;
  }

  .story-section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0 14px;
  }
  .story-section-header::before, .story-section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold-dim);
    opacity: 0.4;
  }
  .story-section-header span {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
  }

  .story-hook {
    font-size: 1.2rem;
    font-style: italic;
    color: var(--text);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .theme-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .theme-item {
    flex: 1;
    min-width: 200px;
    background: rgba(201,168,76,0.03);
    border: 1px solid rgba(201,168,76,0.12);
    padding: 12px 16px;
  }
  .theme-label {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 6px;
  }
  .theme-card-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 5px;
  }
  .theme-text {
    font-size: 0.95rem;
    color: var(--text-dim);
    line-height: 1.5;
    font-style: italic;
  }

  .beat-block {
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(201,168,76,0.08);
  }
  .beat-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .beat-card-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 5px;
  }
  .beat-label {
    font-size: 8px;
    font-family: 'Cinzel', serif;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-right: 6px;
  }
  .beat-text {
    font-size: 1rem;
    color: var(--text);
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    .tarot-card.lg, .tarot-card.md, .tarot-card.sc { width: 62px; height: 94px; }
    .prow { gap: 8px; }
    .story-panel { padding: 24px 20px; }
    .theme-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title-ornament">Maginomicon</div>
    <h1>Tarot Story Generator</h1>
    <p class="subtitle">The Maginomicon Reveals The Way</p>
    <div class="divider"><span>✦</span></div>
  </header>

  <p class="instr" id="instr">Click the card to reveal the Plot Hook</p>

  <div class="pyramid">

    <!-- Row 1: Plot Hook -->
    <div>
      <div class="row-label">Plot Hook</div>
      <div class="prow">
        <div class="card-slot">
          <div class="tarot-card lg clickable" id="c0" onclick="clickCard('hook')">
            <div class="card-back"><svg viewBox="0 0 52 72" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="50" height="70" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L51 71M51 1L1 71" stroke="#c9a84c" stroke-width=".5"/><circle cx="26" cy="36" r="12" stroke="#c9a84c" stroke-width=".6"/><circle cx="26" cy="36" r="4" fill="#c9a84c" fill-opacity=".2"/></svg></div>
            <div class="card-front"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Row 2: Influences -->
    <div>
      <div class="row-label">Influences</div>
      <div class="prow">
        <div class="card-slot">
          <div class="tarot-card md dim" id="c1" onclick="clickCard('pos')">
            <div class="card-back"><svg viewBox="0 0 44 62" fill="none"><rect x="1" y="1" width="42" height="60" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L43 61M43 1L1 61" stroke="#c9a84c" stroke-width=".5"/><circle cx="22" cy="31" r="9" stroke="#c9a84c" stroke-width=".6"/></svg></div>
            <div class="card-front"></div>
          </div>
          <div class="slot-label">Positive</div>
        </div>
        <div class="card-slot">
          <div class="tarot-card md dim" id="c2" onclick="clickCard('neg')">
            <div class="card-back"><svg viewBox="0 0 44 62" fill="none"><rect x="1" y="1" width="42" height="60" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L43 61M43 1L1 61" stroke="#c9a84c" stroke-width=".5"/><circle cx="22" cy="31" r="9" stroke="#c9a84c" stroke-width=".6"/></svg></div>
            <div class="card-front"></div>
          </div>
          <div class="slot-label">Negative</div>
        </div>
      </div>
    </div>

    <!-- Row 3: Acts -->
    <div>
      <div class="row-label">Acts</div>
      <div class="prow">
        <div class="card-slot">
          <div class="tarot-card md dim" id="c3" onclick="clickCard('act1')">
            <div class="card-back"><svg viewBox="0 0 44 62" fill="none"><rect x="1" y="1" width="42" height="60" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L43 61M43 1L1 61" stroke="#c9a84c" stroke-width=".5"/><circle cx="22" cy="31" r="9" stroke="#c9a84c" stroke-width=".6"/></svg></div>
            <div class="card-front"></div>
          </div>
          <div class="slot-label">Act I</div>
        </div>
        <div class="card-slot">
          <div class="tarot-card md dim" id="c4" onclick="clickCard('act2')">
            <div class="card-back"><svg viewBox="0 0 44 62" fill="none"><rect x="1" y="1" width="42" height="60" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L43 61M43 1L1 61" stroke="#c9a84c" stroke-width=".5"/><circle cx="22" cy="31" r="9" stroke="#c9a84c" stroke-width=".6"/></svg></div>
            <div class="card-front"></div>
          </div>
          <div class="slot-label">Act II</div>
        </div>
        <div class="card-slot">
          <div class="tarot-card md dim" id="c5" onclick="clickCard('act3')">
            <div class="card-back"><svg viewBox="0 0 44 62" fill="none"><rect x="1" y="1" width="42" height="60" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L43 61M43 1L1 61" stroke="#c9a84c" stroke-width=".5"/><circle cx="22" cy="31" r="9" stroke="#c9a84c" stroke-width=".6"/></svg></div>
            <div class="card-front"></div>
          </div>
          <div class="slot-label">Act III</div>
        </div>
      </div>
    </div>

    <!-- Row 4: Scenes -->
    <div>
      <div class="row-label" id="scene-lbl">Scenes</div>
      <div class="prow">
        <div class="card-slot">
          <div class="tarot-card sc dim" id="s0" onclick="clickScene(0)">
            <div class="card-back"><svg viewBox="0 0 36 52" fill="none"><rect x="1" y="1" width="34" height="50" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L35 51M35 1L1 51" stroke="#c9a84c" stroke-width=".5"/></svg></div>
            <div class="card-front"></div>
          </div>
          <div class="slot-label">Scene 1</div>
        </div>
        <div class="card-slot">
          <div class="tarot-card sc dim" id="s1" onclick="clickScene(1)">
            <div class="card-back"><svg viewBox="0 0 36 52" fill="none"><rect x="1" y="1" width="34" height="50" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L35 51M35 1L1 51" stroke="#c9a84c" stroke-width=".5"/></svg></div>
            <div class="card-front"></div>
          </div>
          <div class="slot-label">Scene 2</div>
        </div>
        <div class="card-slot">
          <div class="tarot-card sc dim" id="s2" onclick="clickScene(2)">
            <div class="card-back"><svg viewBox="0 0 36 52" fill="none"><rect x="1" y="1" width="34" height="50" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L35 51M35 1L1 51" stroke="#c9a84c" stroke-width=".5"/></svg></div>
            <div class="card-front"></div>
          </div>
          <div class="slot-label">Scene 3</div>
        </div>
        <div class="card-slot">
          <div class="tarot-card sc dim" id="s3" onclick="clickScene(3)">
            <div class="card-back"><svg viewBox="0 0 36 52" fill="none"><rect x="1" y="1" width="34" height="50" rx="3" stroke="#c9a84c" stroke-width=".8"/><path d="M1 1L35 51M35 1L1 51" stroke="#c9a84c" stroke-width=".5"/></svg></div>
            <div class="card-front"></div>
          </div>
          <div class="slot-label">Scene 4</div>
        </div>
      </div>
    </div>

  </div><!-- /pyramid -->

  <div class="pyramid-controls">
    <button class="action-btn dim-btn" onclick="reset()">New Spread</button>
  </div>

  <!-- Story Panel -->
  <div class="story-panel" id="story-panel">
    <div class="story-title">Story Outline</div>
    <div id="story-body"></div>
  </div>

</div><!-- /container -->

let pool=[],drawn={},scenes=[[],[],[]],revealedScenes=[[],[],[]],phase=0;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pick(){if(!pool.length)pool=shuffle(DECK);return{...pool.pop()};}

function cardHTML(c){
  return `<div class="card-num">${c.num}</div><div class="card-sym">${c.sym}</div><div class="card-name">${c.name}</div>`;
}

function revealEl(id,c){
  const el=document.getElementById(id);
  el.classList.remove('dim','clickable');
  el.classList.add('revealed');
  el.querySelector('.card-front').innerHTML=cardHTML(c);
  el.style.cursor='default';
}
function makeClickable(id){
  const el=document.getElementById(id);
  el.classList.remove('dim');
  el.classList.add('clickable');
}
function resetScenes(){
  for(let i=0;i<4;i++){
    const el=document.getElementById('s'+i);
    el.classList.remove('revealed','clickable');
    el.classList.add('dim');
    el.querySelector('.card-front').innerHTML='';
    el.style.cursor='default';
  }
}

function clickCard(role){
  if(role==='hook'&&phase===0){
    drawn.hook=pick();revealEl('c0',drawn.hook);makeClickable('c1');setInstr('Click the Positive Influence');phase=1;
  } else if(role==='pos'&&phase===1){
    drawn.pos=pick();revealEl('c1',drawn.pos);makeClickable('c2');setInstr('Click the Negative Influence');phase=2;
  } else if(role==='neg'&&phase===2){
    drawn.neg=pick();revealEl('c2',drawn.neg);makeClickable('c3');setInstr('Click Act I');phase=3;
  } else if(role==='act1'&&phase===3){
    drawn.act1=pick();revealEl('c3',drawn.act1);
    scenes[0]=[pick(),pick(),pick(),pick()];revealedScenes[0]=[];
    resetScenes();makeClickable('s0');
    document.getElementById('scene-lbl').textContent='Act I — Scenes';
    setInstr('Click Scene 1');phase=4;
  } else if(role==='act2'&&phase===8){
    drawn.act2=pick();revealEl('c4',drawn.act2);
    scenes[1]=[pick(),pick(),pick(),pick()];revealedScenes[1]=[];
    resetScenes();makeClickable('s0');
    document.getElementById('scene-lbl').textContent='Act II — Scenes';
    setInstr('Click Scene 1');phase=9;weaveStory();
  } else if(role==='act3'&&phase===13){
    drawn.act3=pick();revealEl('c5',drawn.act3);
    scenes[2]=[pick(),pick(),pick(),pick()];revealedScenes[2]=[];
    resetScenes();makeClickable('s0');
    document.getElementById('scene-lbl').textContent='Act III — Scenes';
    setInstr('Click Scene 1');phase=14;weaveStory();
  }
}

function clickScene(idx){
  let act,sp;
  if(phase>=4&&phase<=7){act=0;sp=phase-4;}
  else if(phase>=9&&phase<=12){act=1;sp=phase-9;}
  else if(phase>=14&&phase<=17){act=2;sp=phase-14;}
  else return;
  if(idx!==sp)return;

  const c=scenes[act][idx];
  revealEl('s'+idx,c);
  revealedScenes[act].push(c);

  weaveStory();

  const next=idx+1;
  if(next<4){
    makeClickable('s'+next);
    setInstr('Click Scene '+(next+1));
    phase++;
  } else {
    if(act===0){makeClickable('c4');setInstr('Click Act II');phase=8;}
    else if(act===1){makeClickable('c5');setInstr('Click Act III');phase=13;}
    else{setInstr('✦ The spread is complete');phase=18;}
  }
}

function setInstr(t){document.getElementById('instr').textContent=t;}

function reset(){
  pool=[];drawn={};scenes=[[],[],[]];revealedScenes=[[],[],[]];phase=0;
  document.getElementById('story-panel').classList.remove('visible');
  document.getElementById('story-body').innerHTML='';
  document.getElementById('scene-lbl').textContent='Scenes';
  setInstr('Click the card to reveal the Plot Hook');
  ['c0','c1','c2','c3','c4','c5'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.classList.remove('revealed','clickable');
    el.querySelector('.card-front').innerHTML='';
    if(i===0){el.classList.remove('dim');el.classList.add('clickable');}
    else el.classList.add('dim');
    el.style.cursor=i===0?'pointer':'default';
  });
  resetScenes();
}

function sectionHeader(label){
  return `<div class="story-section-header"><span>${label}</span></div>`;
}

function weaveStory(){
  const panel=document.getElementById('story-panel');
  panel.classList.add('visible');
  const h=drawn.hook,pos=drawn.pos,neg=drawn.neg,a1=drawn.act1,a2=drawn.act2,a3=drawn.act3;
  let html='';

  if(h){
    html+=sectionHeader('Plot Hook');
    html+=`<p class="story-hook">${HOOKS[h.num]||''}</p>`;
  }
  if(pos||neg){
    html+=sectionHeader('Themes');
    html+='<div class="theme-row">';
    if(pos){
      html+=`<div class="theme-item"><div class="theme-label">Positive Theme</div><div class="theme-card-name">${pos.name}</div><div class="theme-text">${MODS[pos.num]?MODS[pos.num].p:''}</div></div>`;
    }
    if(neg){
      html+=`<div class="theme-item"><div class="theme-label">Negative Theme</div><div class="theme-card-name">${neg.name}</div><div class="theme-text">${MODS[neg.num]?MODS[neg.num].n:''}</div></div>`;
    }
    html+='</div>';
  }

  function actBlock(label, actCard, revScenes){
    if(!actCard) return '';
    let h=sectionHeader(label);
    h+=`<div class="beat-block"><div class="beat-card-name">${actCard.name}</div><p class="beat-text">${HOOKS[actCard.num]||''}</p></div>`;
    revScenes.forEach((c,i)=>{
      h+=`<div class="beat-block"><div class="beat-card-name"><span class="beat-label">Scene ${i+1}</span>${c.name}</div><p class="beat-text">${BEATS[c.num]||''}</p></div>`;
    });
    return h;
  }

  html+=actBlock('Act I — Beginning', a1, revealedScenes[0]);
  html+=actBlock('Act II — Middle', a2, revealedScenes[1]);
  html+=actBlock('Act III — End', a3, revealedScenes[2]);

  document.getElementById('story-body').innerHTML=html;
}

// init
document.getElementById('c0').classList.add('clickable');
document.getElementById('c0').style.cursor='pointer';
</script>
